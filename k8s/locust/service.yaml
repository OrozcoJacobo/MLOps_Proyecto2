apiVersion: v1
kind: Service
metadata:
  name: locust
  namespace: mlops
spec:
  selector:
    app: locust
  ports:
    - port: 8089
      targetPort: 8089
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: locust-external
  namespace: mlops
spec:
  selector:
    app: locust
  ports:
    - port: 8089
      targetPort: 8089
  type: LoadBalancer