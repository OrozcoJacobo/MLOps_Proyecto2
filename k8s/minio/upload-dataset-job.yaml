apiVersion: batch/v1
kind: Job
metadata:
  name: upload-dataset
  namespace: mlops
spec:
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-minio
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until wget -q --spider http://minio:9000/minio/health/ready; do
                echo "Esperando MinIO...";
                sleep 5;
              done
      containers:
        - name: upload-dataset
          image: python:3.11-slim
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: minio-root-user
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: minio-root-password
          command:
            - sh
            - -c
            - |
              pip install --quiet boto3 requests &&
              python3 - <<'EOF'
              import boto3
              import requests
              import os

              url = "https://drive.usercontent.google.com/download?id=1k5-1caezQ3zWJbKaiMULTGq-3sz6uThC&export=download&authuser=0"
              local_path = "/tmp/diabetic_data.csv"

              print("Descargando dataset desde Google Drive...")
              response = requests.get(url, stream=True, timeout=300)
              response.raise_for_status()

              with open(local_path, "wb") as f:
                  for chunk in response.iter_content(chunk_size=8192):
                      f.write(chunk)

              size_mb = os.path.getsize(local_path) / (1024 * 1024)
              print(f"Dataset descargado: {size_mb:.1f} MB")

              print("Subiendo dataset a MinIO...")
              s3 = boto3.client(
                  "s3",
                  endpoint_url="http://minio:9000",
                  aws_access_key_id=os.environ["MINIO_ROOT_USER"],
                  aws_secret_access_key=os.environ["MINIO_ROOT_PASSWORD"],
              )

              bucket = "mlflow-artifacts"
              key = "datasets/diabetic_data.csv"

              try:
                  s3.head_bucket(Bucket=bucket)
              except Exception:
                  s3.create_bucket(Bucket=bucket)
                  print(f"Bucket {bucket} creado.")

              s3.upload_file(local_path, bucket, key)
              print(f"Dataset subido exitosamente a s3://{bucket}/{key}")
              EOF
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"